# DnD Build Forge — Docker Compose
#
# Продакшн (по умолчанию): собирает Vite-билд и отдаёт его через nginx.
#   docker compose up --build           ->  http://localhost:8080
#
# Дев-режим с hot-reload (профиль "dev"):
#   docker compose --profile dev up      ->  http://localhost:5173

services:
  # --- Production: статическая сборка за nginx ---
  web:
    build:
      context: .
      target: serve
    image: dnd-build-forge:latest
    ports:
      - "8080:80"
    restart: unless-stopped

  # --- Development: Vite dev server с горячей перезагрузкой ---
  dev:
    profiles: ["dev"]
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      # Изолируем node_modules контейнера от хоста.
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
