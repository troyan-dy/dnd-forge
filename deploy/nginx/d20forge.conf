# Reverse-proxy для DnD Build Forge с HTTPS (Let's Encrypt).
#
# Общий nginx на хосте владеет портами 80/443 и разруливает по server_name.
# Контейнер dnd-forge публикует приложение на 127.0.0.1:8080 — сюда и проксируем.
# Это НЕ default_server (им владеет другой сайт) — роутинг строго по имени.
#
# Сертификат выпускается и продлевается через webroot (/var/www/certbot) — этот
# конфиг сертботом НЕ редактируется и остаётся источником правды в git.
#
# Первый выпуск (челлендж отдаёт default_server из общего webroot):
#   certbot certonly --webroot -w /var/www/certbot -d d20forge.duckdns.org
#   ln -s /opt/dnd-forge/deploy/nginx/d20forge.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx

# HTTP: отдаём ACME-челлендж (для выпуска/продления) и редиректим всё на HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name d20forge.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: TLS + проксирование на контейнер dnd-forge (nginx внутри отдаёт SPA).
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name d20forge.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/d20forge.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/d20forge.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                            always;
    add_header X-Frame-Options           "SAMEORIGIN"                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"    always;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
