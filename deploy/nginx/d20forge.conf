# d20forge.duckdns.org -> контейнер dnd-forge (127.0.0.1:8080).
# Системный nginx на хосте терминирует HTTPS (сертификат от Let's Encrypt/certbot)
# и проксирует на опубликованный порт контейнера. Это НЕ default_server —
# роутинг по server_name, чтобы не мешать другим сайтам.
#
# Включение: симлинк в /etc/nginx/sites-enabled/ + сертификат:
#   certbot certonly --nginx -d d20forge.duckdns.org
#   ln -s /opt/dnd-forge/deploy/nginx/d20forge.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name d20forge.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name d20forge.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/d20forge.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/d20forge.duckdns.org/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
